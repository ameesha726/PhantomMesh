<!DOCTYPE html>
<html>

<head>
  <title>Department B</title>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #2563eb;
      color: white;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    h2 {
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Department B (No API)</h2>

  <label>UBID</label>
  <input id="ubid" value="123">

  <label>Business Name</label>
  <input id="business_name" value="ABC Industries">

  <label>Address</label>
  <input id="address" value="Benagluru">

  <label>Status</label>
  <select id="status">
    <option>Pending</option>
    <option>Approved</option>
    <option>Rejected</option>
  </select>

  <label>Authorized Signatory</label>
  <input id="signatory" value="Ameesha">

  <button onclick="save()">Save</button>

  <p id="msg"></p>

</div>

<script>
function save() {
  document.getElementById("msg").innerText =
    "Saved at " + new Date().toLocaleTimeString();
}
</script>

</body>
</html>
